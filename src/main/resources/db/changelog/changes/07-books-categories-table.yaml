databaseChangeLog:
  - changeSet:
      id: book-category-join-table
      author: Bohdan Buhrak
      runOnChange: true
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: books_categories
      changes:
        - createTable:
            tableName: books_categories
            columns:
              - column:
                  name: book_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false
