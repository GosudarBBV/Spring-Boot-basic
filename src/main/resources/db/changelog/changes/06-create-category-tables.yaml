databaseChangeLog:
  - changeSet:
      id: add-categories-table
      author: Bohdan Buhrak
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: categories
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT AUTO_INCREMENT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: is_deleted
                  type: BIT
                  defaultValueBoolean: false


