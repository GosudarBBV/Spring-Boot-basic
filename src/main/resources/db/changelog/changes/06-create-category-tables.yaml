databaseChangeLog:
  - changeSet:
      id: add-categories-table
      author: Bohdan Buhrak
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: categories
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT AUTO_INCREMENT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: is_deleted
                  type: BIT
                  defaultValueBoolean: false

  - changeSet:
      id: book-category-join-table
      author: Bohdan Buhrak
      runOnChange: true
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: books_categories
      changes:
        - createTable:
            tableName: books_categories
            columns:
              - column:
                  name: book_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false
